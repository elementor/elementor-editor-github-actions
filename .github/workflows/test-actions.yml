name: Test Actions

on: [pull_request, workflow_dispatch]

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test-performance-flow:
        name: Performance flow (Setup WP, Elementor env and run Lighthouse tests)
        runs-on: ubuntu-latest
        if: startsWith( github.repository, 'elementor/' )
        steps:
            - name: Checkout source code
              uses: actions/checkout@v4

            - name: Setup WP Env
              uses: ./actions/setup-wp-env
              with:
                  php: '8.0'
                  wp: '6.6'
                  active-theme: 'hello-elementor'
                  themes: |-
                      https://downloads.wordpress.org/theme/hello-elementor.zip
                  plugins: |-
                      https://downloads.wordpress.org/plugin/elementor.zip
                  mappings: |-
                      elementor-templates:./stubs/elementor-templates
                  config: |-
                      ELEMENTOR_SHOW_HIDDEN_EXPERIMENTS:1

            - name: Setup Elementor Env
              uses: ./actions/setup-elementor-env
              with:
                  env: 'testing'
                  enable-svg-upload: true
                  experiments: |-
                      e_atomic_elements:true
                  templates: |-
                      elementor-templates

            - name: Run Lighthouse tests
              uses: ./actions/run-lighthouse-tests
              id: run-lighthouse-tests
              with:
                  number-of-runs: 3
                  urls: |-
                      mixed:http://localhost:8889/mixed-template/
                      v3:http://localhost:8889/v3-only/
                  categories: |-
                      performance

            - name: Check if score meets the threshold
              uses: actions/github-script@v7
              env:
                  MIXED_PERFORMANCE_SCORE: ${{ steps.run-lighthouse-tests.outputs.mixed-performance-median-score }}
                  V3_PERFORMANCE_SCORE: ${{ steps.run-lighthouse-tests.outputs.v3-performance-median-score }}
                  THRESHOLD: 0.70
              with:
                  script: |
                      const { MIXED_PERFORMANCE_SCORE, V3_PERFORMANCE_SCORE, THRESHOLD } = process.env;

                      if (MIXED_PERFORMANCE_SCORE < THRESHOLD) {
                          throw new Error(`Mixed template performance score ${MIXED_PERFORMANCE_SCORE} is below the threshold ${THRESHOLD}`);
                      }

                      if (MIXED_PERFORMANCE_SCORE < V3_PERFORMANCE_SCORE) {
                          throw new Error(`Mixed template performance score ${MIXED_PERFORMANCE_SCORE} is not greater than V3 template performance score ${V3_PERFORMANCE_SCORE}`);
                      }

            - name: Upload reports
              if: failure() && steps.run-lighthouse-tests.outputs.reports-path
              uses: actions/upload-artifact@v4
              with:
                  name: performance-reports
                  path: ${{ steps.run-lighthouse-tests.outputs.reports-path }}
                  retention-days: 3
